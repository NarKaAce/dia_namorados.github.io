<!DOCTYPE HTML>
<html>
	<head>
		<title>Surpresa Final</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="icon" type="image/svg" href="images/logo.svg" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/custom.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload inner-page">
		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<div class="inner">

						</div>
					</header>

				<!-- Main -->
					<div id="main">
						<div class="inner">
							<header>
								<a href="index.html" class="voltar">
									← Voltar
								</a>
							</header>

							<section class="presente-final">
								<div class="presente-intro">
									<h1>❤ Surpresa Final</h1>

									<p>
										Agora você vai ter que escolher, sabe...
									</p>
								</div>

								<div class="presentes-grid" aria-label="Opções de presente">
									<button class="presente-opcao" type="button" data-presente="jogo">
										<span class="presente-icone">
											<i class="fas fa-gamepad" aria-hidden="true"></i>
										</span>

										<span class="presente-conteudo">
											<span class="presente-nome">Um jogo surpresa</span>
											<span class="presente-texto">
												Eu vou te dar um jogo, mas o nome fica em segredo por enquanto.
											</span>
										</span>

										<span class="presente-check">
											<i class="fas fa-check" aria-hidden="true"></i>
										</span>
									</button>

									<button class="presente-opcao" type="button" data-presente="unha">
										<span class="presente-icone">
											<i class="fas fa-hand-sparkles" aria-hidden="true"></i>
										</span>

										<span class="presente-conteudo">
											<span class="presente-nome">A unha por minha conta</span>
											<span class="presente-texto">
												Você deixa eu pagar a unha, porque você merece pra viajar com ela bunitinha.
											</span>
										</span>

										<span class="presente-check">
											<i class="fas fa-check" aria-hidden="true"></i>
										</span>
									</button>
								</div>

								<div class="presente-acoes">
									<button id="confirmar-presente" type="button" disabled>
										Confirmar escolha
									</button>

									<p id="mensagem-presente" aria-live="polite"></p>
								</div>
							</section>
						</div>
					</div>

				<!-- Footer -->
					<footer id="footer">
						<div class="inner">
							<section>
								<h2>Love u</h2>
							</section>
						</div>
					</footer>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="assets/js/custom/final.js"></script>

	</body>
</html>
